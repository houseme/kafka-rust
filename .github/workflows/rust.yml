name: Rust

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest
      - name: Run unit tests
        run: |
          cargo nextest run --all
          cargo test --all --doc

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build

  docs:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check documentation coverage
        run: RUSTDOCFLAGS="--warn-missing-docs" cargo doc --no-deps 2>&1
        continue-on-error: true

  integration-test:
    name: Integration (Kafka ${{ matrix.KAFKA_VER }}${{ matrix.SECURE_LABEL }})
    runs-on: ubuntu-latest
    needs: [ lint, unit-test, build ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - KAFKA_VER: "3.9.2"
            SECURE: ""
            SECURE_LABEL: ""
          - KAFKA_VER: "3.9.2"
            SECURE: "secure"
            SECURE_LABEL: " (secure)"
          - KAFKA_VER: "4.1.2"
            SECURE: ""
            SECURE_LABEL: ""
          - KAFKA_VER: "4.1.2"
            SECURE: "secure"
            SECURE_LABEL: " (secure)"
          - KAFKA_VER: "4.2.0"
            SECURE: ""
            SECURE_LABEL: ""
          - KAFKA_VER: "4.2.0"
            SECURE: "secure"
            SECURE_LABEL: " (secure)"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: |
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          chmod +x ./tests/run-all-tests
          ./tests/run-all-tests ${{ matrix.KAFKA_VER }}
        env:
          KAFKA_VER: ${{ matrix.KAFKA_VER }}
          SECURES: ${{ matrix.SECURE }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit
        continue-on-error: true

  benches:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench -- --noplot 2>&1 | tail -20
        continue-on-error: true

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Typos check with custom config file
        uses: crate-ci/typos@master

  # Test different TLS backend configurations
  tls-backends:
    name: Test TLS Backends
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - name: "Default (aws-lc-rs)"
            features: ""
            extra_args: ""
          - name: "Explicit aws-lc-rs"
            features: "security"
            extra_args: "--no-default-features --features=security"
          - name: "ring"
            features: "security-ring"
            extra_args: "--no-default-features --features=security-ring"
          - name: "No security"
            features: ""
            extra_args: "--no-default-features"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build - ${{ matrix.name }}
        run: |
          if [ -z "${{ matrix.extra_args }}" ]; then
            cargo build --verbose
          else
            cargo build --verbose ${{ matrix.extra_args }}
          fi
      - name: Test - ${{ matrix.name }}
        run: |
          if [ -z "${{ matrix.extra_args }}" ]; then
            cargo test --verbose
          else
            cargo test --verbose ${{ matrix.extra_args }}
          fi

  # Test musl build to verify pure-Rust TLS
  musl-build:
    name: Test musl build (pure Rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build for musl with rustls
        run: cargo build --target x86_64-unknown-linux-musl --verbose
