name: Rust

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: 1
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: NONE
            SECURES: ""
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: NONE
            SECURES: secure
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: SNAPPY
            SECURES: ""
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: SNAPPY
            SECURES: secure
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: GZIP
            SECURES: ""
          - KAFKA_VER: 3.4.0
            COMPRESSIONS: GZIP
            SECURES: secure
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: NONE
            SECURES: ""
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: NONE
            SECURES: secure
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: SNAPPY
            SECURES: ""
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: SNAPPY
            SECURES: secure
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: GZIP
            SECURES: ""
          - KAFKA_VER: 3.8.0
            COMPRESSIONS: GZIP
            SECURES: secure
    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USER }}" --password-stdin

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build
      run: cargo build
      
    - name: Make the test script executable
      run: chmod +x ./tests/run-all-tests

    - name: Run tests
      run: ./tests/run-all-tests ${{ matrix.KAFKA_VER }}
      env:
        KAFKA_VER: ${{ matrix.KAFKA_VER }}
        COMPRESSIONS: ${{ matrix.COMPRESSIONS }}
        SECURES: ${{ matrix.SECURES }}

    - name: Generate documentation
      run: cargo doc

  # Test different TLS backend configurations
  tls-backends:
    name: Test TLS Backends
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "Default (rustls)"
            features: ""
            extra_args: ""
          - name: "Explicit rustls"
            features: "security-rustls"
            extra_args: "--no-default-features --features=snappy,gzip,security-rustls"
          - name: "OpenSSL (deprecated)"
            features: "security-openssl"
            extra_args: "--no-default-features --features=snappy,gzip,security-openssl"
          - name: "No security"
            features: "no-security"
            extra_args: "--no-default-features --features=snappy,gzip"
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      
      - name: Build - ${{ matrix.name }}
        run: |
          if [ -z "${{ matrix.extra_args }}" ]; then
            cargo build --verbose
          else
            cargo build --verbose ${{ matrix.extra_args }}
          fi
      
      - name: Test - ${{ matrix.name }}
        run: |
          if [ -z "${{ matrix.extra_args }}" ]; then
            cargo test --verbose
          else
            cargo test --verbose ${{ matrix.extra_args }}
          fi

  # Test musl build to verify no OpenSSL dependency with rustls
  musl-build:
    name: Test musl build (OpenSSL-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: x86_64-unknown-linux-musl
      
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      
      - name: Build for musl with rustls
        run: cargo build --target x86_64-unknown-linux-musl --features=security-rustls --verbose
      
      - name: Verify no OpenSSL dependency
        run: |
          if ldd target/x86_64-unknown-linux-musl/debug/libkafka.* 2>/dev/null | grep -i openssl; then
            echo "ERROR: musl build should not depend on OpenSSL!"
            exit 1
          else
            echo "✓ musl build is OpenSSL-free (as expected with rustls)"
          fi
