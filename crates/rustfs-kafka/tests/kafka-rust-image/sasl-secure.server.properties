# ZooKeeper mode SASL+SSL server properties for Kafka 3.x

broker.id=0

num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

log.dirs=/kafka/logs
num.partitions=1
num.recovery.threads.per.data.dir=1
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000
log.cleaner.enable=false

zookeeper.connect=zookeeper
zookeeper.connection.timeout.ms=6000

ssl.keystore.location=/server.keystore.jks
ssl.keystore.password=xxxxxx
ssl.key.password=xxxxxx

listeners=SASL_SSL://:9092,PLAINTEXT://:9093
advertised.listeners=SASL_SSL://localhost:9092,PLAINTEXT://:9093
listener.security.protocol.map=SASL_SSL:SASL_SSL,PLAINTEXT:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

sasl.enabled.mechanisms=PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
listener.name.sasl_ssl.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required user_test="test-pass";
listener.name.sasl_ssl.scram-sha-256.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;
listener.name.sasl_ssl.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;

offsets.topic.replication.factor=1
